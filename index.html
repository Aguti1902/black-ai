<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Black AI — global digital infrastructure platform for hyperscale AI data center assets." />
    <title>Black AI — Infrastructure for the AI Economy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply persisted theme before paint to avoid a flash. Light is default.
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'light'
          document.documentElement.setAttribute('data-theme', t)
          var l = localStorage.getItem('lang') || 'en'
          document.documentElement.setAttribute('lang', l)
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
